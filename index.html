<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CareerOS GCC" />
    <meta name="theme-color" content="#C9A84C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CareerOS" />
    <title>CareerOS GCC</title>
    <link rel="icon" type="image/svg+xml" href="/careeros-gcc/favicon.svg" />
    <link rel="manifest" href="/careeros-gcc/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var PWD = 'gcc2025';
        try {
          if (localStorage.getItem('co_access') !== PWD) {
            var input = window.prompt('CareerOS GCC - Password required:');
            if (input !== PWD) {
              document.documentElement.innerHTML = '<html><head><meta charset="UTF-8"/><style>body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0A1628;font-family:sans-serif;color:#C9A84C;gap:12px;text-align:center;}</style></head><body><div style="font-size:48px">&#128274;</div><div style="font-size:20px;font-weight:700">Access Denied</div><a href="" style="color:#C9A84C;font-size:13px">Refresh to try again</a></body></html>';
              return;
            }
            localStorage.setItem('co_access', PWD);
          }
        } catch (e) {}
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/careeros-gcc/sw.js').catch(function () {});
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
